<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Аналитика — БПИФы АТОН</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scrollbar-gutter:stable}
body{font-family:"Graphik","Inter","Segoe UI",system-ui,-apple-system,sans-serif;background:#f0f3f8;color:#111;font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}

.header{background:#000;border-bottom:1px solid #e6e6ef;padding:18px 28px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
.header-logo{height:36px;width:auto;display:block}
.header-title{color:#fff;font-size:.9rem;font-weight:500;letter-spacing:.02em;opacity:.85}

.s{max-width:1040px;margin:32px auto 36px;background:#fff;border-radius:10px;border:1px solid #ececf2;overflow:hidden}

.sh{position:relative;background:#fff;border-bottom:1px solid #ececf2;padding:16px 28px;display:flex;flex-direction:column;align-items:stretch;gap:12px;overflow:hidden}
.sh::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:8px;border-radius:0 4px 4px 0;background:#6f3ff5;transition:all .2s}
.sh-row{position:relative;z-index:2;display:flex;align-items:center;flex-wrap:wrap;gap:10px}
.sh-row-top{justify-content:space-between}
.sh-row-bottom{justify-content:space-between;gap:14px}
.sh h2{font-size:1rem;font-weight:600;color:#111}

.period-dates{display:flex;align-items:center;gap:8px;font-size:.75rem;color:#666}
.period-dates input{color:#333;text-align:center;border:1px solid #d9d9e6;padding:6px 10px;border-radius:999px;font-size:.75rem;background:#fff;width:108px;cursor:pointer;font-family:inherit}
.period-dates input:hover{border-color:#6f3ff5}

.period-btns{display:flex;gap:4px;flex-wrap:wrap}
.period-btn{padding:4px 12px;border-radius:999px;border:1px solid #ececf2;background:#f1f1f7;color:#333;font-size:.7rem;cursor:pointer;font-family:inherit;font-weight:600;transition:.15s}
.period-btn:hover{background:#6f3ff5;color:#fff;border-color:#6f3ff5}
.period-btn.active{background:#6f3ff5;color:#fff;border-color:#6f3ff5}
.period-btn-sep{width:1px;align-self:stretch;background:#ececf2;margin:2px 4px}

.curr-toggle{display:inline-flex;align-items:center;border-radius:999px;border:1px solid #d0d5e0;background:#fafafe;padding:3px 4px;gap:2px;flex-shrink:0}
.curr-toggle-opt{background:transparent;border:none;padding:5px 12px;border-radius:999px;font-size:.7rem;font-weight:600;font-family:inherit;cursor:pointer;color:#8a8a96;transition:.15s}
.curr-toggle-opt:hover{color:#6b6b7a}
.curr-toggle-opt.active{background:#fff;color:#6f3ff5;box-shadow:0 0 0 1px rgba(111,63,245,.15)}
.curr-toggle-sep{color:#c5c5ce;font-weight:500;font-size:.72rem;user-select:none;padding:0 1px}

.chart-wrap{padding:18px 18px 24px}
#chart{width:100%;height:520px}

.series-panel{display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #ececf2;background:#fff}
.series-group{padding:16px 22px;border-right:1px solid #ececf2;min-width:0}
.series-group:last-child{border-right:none}
.series-group-title{font-size:.68rem;text-transform:uppercase;letter-spacing:.06em;color:#8a8a96;font-weight:600;margin-bottom:12px}
.series-chips{display:flex;flex-direction:column;align-items:flex-start;gap:8px}
.series-chip{align-self:flex-start}
.series-empty{font-size:.7rem;color:#b8bcc7;font-style:italic;padding:2px 0}
.series-chip{
  --c:#999;
  position:relative;padding:5px 12px 5px 10px;border-radius:999px;
  border:1px solid #ececf2;background:#fafafe;color:#6b6b7a;
  font-size:.72rem;font-family:inherit;font-weight:600;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:background .2s ease,color .2s ease,border-color .2s ease,box-shadow .25s ease,transform .15s ease
}
.series-chip::before{
  content:'';width:7px;height:7px;border-radius:50%;background:var(--c);
  opacity:.55;transition:opacity .2s ease,box-shadow .2s ease,background .2s ease
}
.series-chip:hover{border-color:var(--c);color:#111;background:#fff}
.series-chip:hover::before{opacity:1;box-shadow:0 0 0 3px color-mix(in srgb, var(--c) 18%, transparent)}
.series-chip.active{
  background:var(--c);color:#fff;border-color:var(--c);
  box-shadow:0 4px 14px -4px color-mix(in srgb, var(--c) 65%, transparent)
}
.series-chip.active::before{background:#fff;opacity:1;box-shadow:none}
.series-chip:active{transform:translateY(1px)}

.legend-note{padding:12px 28px;font-size:.74rem;color:#9aa1ad;border-top:1px solid #ececf2;background:#fafafe}
.legend-note .hint{display:inline-block;margin-right:14px}
.legend-note .hint b{color:#6b6b7a;font-weight:600}

.footer{text-align:center;padding:30px;color:#9aa1ad;font-size:.78rem}

.results-table-wrap{border-top:1px solid #ececf2;padding:0 0 4px}
.results-table{width:100%;border-collapse:collapse;font-size:.78rem}
.results-table thead tr{border-bottom:1px solid #ececf2}
.results-table thead th{padding:10px 20px;font-size:.66rem;text-transform:uppercase;letter-spacing:.06em;color:#8a8a96;font-weight:600;text-align:left;white-space:nowrap}
.results-table thead th.num{text-align:right}
.results-table tbody tr{border-bottom:1px solid #f5f5fa;transition:background .12s,opacity .28s ease,transform .28s ease}
.results-table tbody tr:last-child{border-bottom:none}
.results-table tbody tr:hover{background:#fafafe}
.results-table tbody tr.rt-enter{opacity:0;transform:translateY(-7px)}
.results-table tbody tr.rt-exit{opacity:0;transform:translateY(7px);pointer-events:none}
.results-table td{padding:9px 20px;vertical-align:middle}
.results-table td.rank{color:#b8bcc7;font-weight:700;font-size:.68rem;width:24px;text-align:right}
.results-table td.name-cell{display:flex;align-items:center;gap:9px}
.results-table td.name-cell .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.results-table td.name-cell .sname{font-weight:600;color:#111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:260px}
.results-table td.name-cell .cluster{font-size:.68rem;color:#9aa1ad;margin-left:2px}
.results-table td.ret{text-align:right;font-weight:700;font-size:.82rem;font-variant-numeric:tabular-nums;white-space:nowrap}
.results-table td.ret.pos{color:#1f8a4d}
.results-table td.ret.neg{color:#d04343}
.results-table td.ret.zero{color:#9aa1ad}
.results-table-empty{padding:20px 24px;font-size:.78rem;color:#b8bcc7;font-style:italic}

@media(max-width:768px){
  .results-table thead th{padding:8px 14px;font-size:.62rem}
  .results-table td{padding:8px 14px}
  .results-table td.name-cell .sname{max-width:160px}
  .results-table td.ret{font-size:.76rem}
}

@media(max-width:768px){
  body{font-size:13px}
  .s{margin:12px 8px 0;border-radius:8px}
  .header{padding:14px 16px}
  .header-logo{height:30px}

  .sh{padding:14px 18px;gap:10px}
  .sh::before{left:0;top:6px;bottom:6px;width:6px}
  .sh h2{font-size:.95rem}
  .sh-row{gap:8px}
  .sh-row-top,.sh-row-bottom{justify-content:flex-start}

  .period-dates{font-size:.7rem;gap:6px}
  .period-dates input{width:96px;padding:6px 9px;font-size:.7rem}

  /* Кнопки крупнее, чтобы было удобно тыкать пальцем */
  .period-btns{gap:5px;width:100%}
  .period-btn{padding:7px 12px;font-size:.7rem}
  .period-btn-sep{margin:2px 2px}

  .curr-toggle{padding:2px 3px}
  .curr-toggle-opt{padding:7px 11px;font-size:.7rem}

  .chart-wrap{padding:14px 6px 18px}
  #chart{height:340px}

  .series-panel{grid-template-columns:1fr}
  .series-group{padding:14px 18px;border-right:none;border-bottom:1px solid #ececf2}
  .series-group:last-child{border-bottom:none}
  .series-group-title{font-size:.66rem;margin-bottom:10px}
  .series-chips{gap:8px}
  .series-chip{padding:8px 14px 8px 12px;font-size:.78rem}
  .series-chip::before{width:8px;height:8px}

  .footer{padding:24px 16px;font-size:.72rem}
}

@media(max-width:480px){
  .sh{padding:12px 14px}
  .sh h2{font-size:.9rem}
  .period-btn{padding:6px 10px;font-size:.66rem}
  .period-dates input{width:88px;font-size:.68rem;padding:6px 7px}
  .curr-toggle-opt{padding:6px 9px;font-size:.66rem}
  #chart{height:300px}
  .series-group{padding:12px 14px}
  .chart-wrap{padding:12px 2px 14px}
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html"><img src="Logo.svg" alt="" class="header-logo" onerror="this.style.display='none'"></a>
</div>

<div class="s" id="analyticsBlock">
  <div class="sh">
    <div class="sh-row sh-row-top">
      <h2>Аналитика</h2>
      <div class="period-dates">
        <span>от</span>
        <input type="text" id="dateFrom" placeholder="ДД.ММ.ГГГГ" readonly>
        <span>по</span>
        <input type="text" id="dateTo" placeholder="ДД.ММ.ГГГГ" readonly>
      </div>
    </div>
    <div class="sh-row sh-row-bottom">
      <div class="curr-toggle" id="currToggle" role="group" aria-label="Валюта отображения">
        <button type="button" class="curr-toggle-opt" data-curr="RUB">RUB</button>
        <span class="curr-toggle-sep">/</span>
        <button type="button" class="curr-toggle-opt active" data-curr="USD">USD</button>
      </div>
      <div class="period-btns" id="periodBtns">
        <button class="period-btn" data-period="1W">1W</button>
        <button class="period-btn" data-period="1M">1M</button>
        <button class="period-btn" data-period="1Y">1Y</button>
        <button class="period-btn" data-period="YTD">С начала года</button>
        <span class="period-btn-sep" aria-hidden="true"></span>
        <button class="period-btn active" data-period="Y2014">2014</button>
        <button class="period-btn" data-period="Y2022">2022</button>
      </div>
    </div>
  </div>

  <div class="chart-wrap">
    <div id="chart"></div>
  </div>

  <div class="series-panel" id="seriesPanel"></div>
  <div class="results-table-wrap" id="resultsTableWrap"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/flatpickr.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr@4.6.13/dist/l10n/ru.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>

<!-- Файлы реальных данных. Каждый регистрирует window.SERIES_REAL[<id>].<RUB|USD>.
     Чтобы добавить новый тикер: положить data/<id>_rub.js и/или data/<id>_usd.js
     по аналогии с mcftr_*.js и подключить здесь ниже. -->
<script src="mcftr_rub.js?v=4"></script>
<script src="mcftr_usd.js?v=4"></script>
<script src="msci_rub.js?v=1"></script>
<script src="msci_usd.js?v=1"></script>
<script src="bp.js?v=3"></script>
<script src="exxon.js?v=1"></script>
<script src="jpm.js?v=1"></script>
<script src="bofa.js?v=1"></script>
<script src="hsbc.js?v=1"></script>
<script src="shell.js?v=1"></script>
<script src="barclays.js?v=1"></script>
<script src="chevron.js?v=1"></script>
<script src="tte.js?v=1"></script>

<script>
(function(){
  // ===== КЛАСТЕРЫ БУМАГ =====
  // Палитры (оставлены под будущие тикеры, проверены на белом фоне):
  //   Нефть и газ : #F56E8E (розовый), #F9AC8B (персиковый), #E8B431 (золотой)
  //   Банки       : #5786FF (синий),   #04AEAE (бирюзовый),  #3DC489 (зелёный)
  //   Индексы     : #6f3ff5 (фиолет.), #9CA3FF (лавандовый), #5EEAD4 (мятный)
  // При добавлении новой бумаги в кластер — берите следующий неиспользованный
  // цвет из соответствующей палитры (или подбирайте близкий по тону).
  const SERIES_GROUPS=[
    {
      id:'oil', title:'Нефть и газ', dot:'#F56E8E',
      items:[
        // BP — данные с реинвестом дивидендов (см. data/bp.js):
        // SERIES_DATA[id][curr] хранится как {prices, dividends}, а
        // getFilteredSeriesArray() разворачивает total-return-кривую
        // (qty=1 на дате «от», на каждой ex-date qty растёт).
        {id:'bp',      name:'British Petroleum', color:'#F56E8E', seed:1},
        {id:'shell',   name:'Shell',             color:'#F9AC8B', seed:2},
        {id:'exxon',   name:'Exxon Mobil',       color:'#E8B431', seed:3},
        {id:'chevron', name:'Chevron',            color:'#4FACFE', seed:4},
        {id:'tte',     name:'TotalEnergies',      color:'#C84B31', seed:5}
      ]
    },
    {
      id:'banks', title:'Банки', dot:'#5786FF',
      items:[
        {id:'jpm',      name:'JPMorgan Chase',  color:'#5786FF', seed:2},
        {id:'bofa',     name:'Bank of America', color:'#3DC489', seed:4},
        {id:'barclays', name:'Barclays',        color:'#04AEAE', seed:3},
        {id:'hsbc',     name:'HSBC',            color:'#9CA3FF', seed:5}
      ]
    },
    {
      id:'idx', title:'Индексы', dot:'#6f3ff5',
      items:[
        // seed нужен только для генерации временной демо-кривой до подмены
        // реальными данными из data/mcftr_*.js — после подмены он не используется.
        {id:'mcftr', name:'Индекс МосБиржи/РТС полной доходности', color:'#6f3ff5', seed:7},
        {id:'msci',  name:'MSCI Emerging Markets', color:'#9CA3FF', seed:8}
      ]
    }
  ];

  const ALL_ITEMS=SERIES_GROUPS.flatMap(g=>g.items);

  // ===== ВРЕМЕННЫЕ ДЕМО-ДАННЫЕ =====
  // Структура: SERIES_DATA[id] = { RUB: [{date, value}], USD: [{date, value}] }
  // Позже подставим реальные значения (две пары цен — рубли и доллары) из таблиц.
  function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return ((t^t>>>14)>>>0)/4294967296;}}
  function genDemoForSeed(seed){
    const rub=[];
    const usd=[];
    const start=new Date(2014,0,1);
    const end=new Date();
    const rnd=mulberry32(seed*9973+17);
    const rndUsd=mulberry32(seed*4973+91);
    let v=40+seed*15+rnd()*30;
    let u=v/85;
    const drift=((seed%5)-2)*0.0009;
    const vol=0.9+((seed*13)%7)*0.18;
    const phase=seed*0.7;
    for(let t=start.getTime(); t<=end.getTime(); t+=86400000){
      const d=new Date(t);
      v=Math.max(1, v + (rnd()-0.5+drift)*vol + Math.sin(t/1e10+phase)*0.5);
      u=Math.max(0.05, u + (rndUsd()-0.5+drift*0.7)*vol*0.012 + Math.sin(t/1e10+phase+1)*0.006);
      const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      rub.push({date:iso,value:+v.toFixed(2)});
      usd.push({date:iso,value:+u.toFixed(4)});
    }
    return {RUB:rub,USD:usd};
  }

  const SERIES_DATA={};
  ALL_ITEMS.forEach(it=>{SERIES_DATA[it.id]=genDemoForSeed(it.seed);});

  // Подменяем демо-данные реальными значениями (если для серии есть файл в data/).
  // Файлы data/<id>_rub.js и data/<id>_usd.js регистрируют window.SERIES_REAL[id].{RUB|USD}.
  // Если для какой-то валюты ключ присутствует (даже пустым массивом) — он используется,
  // и серия в этой валюте показывает только реальные точки (или ничего, если массив пуст,
  // как сейчас в data/mcftr_usd.js — пока ждём RTSTR).
  if(window.SERIES_REAL){
    Object.keys(window.SERIES_REAL).forEach(function(id){
      var real=window.SERIES_REAL[id];
      if(!real) return;
      // Гарантируем, что запись в SERIES_DATA существует
      // (нужно для серий, добавленных в SERIES_GROUPS, но не имеющих demo-seed).
      if(!SERIES_DATA[id]) SERIES_DATA[id]={};
      if(real.RUB) SERIES_DATA[id].RUB = real.RUB;
      if(real.USD) SERIES_DATA[id].USD = real.USD;
    });
  }

  // Глобальные границы дат — берём по объединению всех серий в RUB,
  // чтобы dataMin/MaxIso покрывали всё, что есть в SERIES_DATA.
  // Поддерживаем оба формата хранения серии:
  //   - массив [{date, value}]            (mcftr и т.п.)
  //   - объект {prices, dividends}         (bp и подобные с реинвестом)
  function _pricesArrOf(v){
    if(!v) return [];
    return Array.isArray(v) ? v : (v.prices||[]);
  }
  let _gminIso=null,_gmaxIso=null;
  ALL_ITEMS.forEach(function(it){
    const d=SERIES_DATA[it.id]; if(!d) return;
    const a=_pricesArrOf(d.RUB||d.USD);
    if(!a.length) return;
    const f=a[0].date, l=a[a.length-1].date;
    if(_gminIso===null || f<_gminIso) _gminIso=f;
    if(_gmaxIso===null || l>_gmaxIso) _gmaxIso=l;
  });
  const _today=new Date();
  const _todayIso=_today.getFullYear()+'-'+String(_today.getMonth()+1).padStart(2,'0')+'-'+String(_today.getDate()).padStart(2,'0');
  const dataMinIso=_gminIso||'2014-01-01';
  const dataMaxIso=_gmaxIso||_todayIso;
  const dataMinTs=new Date(dataMinIso+'T00:00:00').getTime();
  const dataMaxTs=new Date(dataMaxIso+'T00:00:00').getTime();

  // ===== СОСТОЯНИЕ =====
  // По умолчанию активна одна серия — Индексы → MCFTR (реальные данные), валюта — RUB.
  const visibleSet=new Set(['bp','jpm','mcftr']);
  const opacityState={};
  ALL_ITEMS.forEach(it=>{opacityState[it.id]=visibleSet.has(it.id)?1:0;});
  let activeCurrency='USD';
  let isCurrencyTransitioning=false;

  // Активный интервал = выбранный пользователем период (через кнопку или
  // календарь). Все точки до activeFromIso и после activeToIso ИГНОРИРУЮТСЯ
  // полностью: они не попадают в серию ECharts, не учитываются в Y-оси и в
  // подсказке. База нормализации = первая точка серии внутри [from..to].
  let activeFromIso=null; // инициализируется ниже после periodToRange
  let activeToIso=null;

  /** Сырой массив цен серии в активной валюте (без фильтрации по интервалу
   *  и без реинвеста). Поддерживает оба формата SERIES_DATA[id][curr]:
   *    - простой:     массив [{date, value}]
   *    - расширенный: объект {prices: [{date, value}], dividends: [{...}]} */
  function getRawPrices(id){
    const d=SERIES_DATA[id]; if(!d)return [];
    const v=d[activeCurrency]||d.RUB||d.USD;
    if(!v)return [];
    return Array.isArray(v) ? v : (v.prices||[]);
  }
  /** Список дивидендных событий серии в активной валюте (или [] если их нет).
   *  Каждый элемент: {dividend, lastBuy, exDate} в ISO-датах. */
  function getRawDividends(id){
    const d=SERIES_DATA[id]; if(!d)return [];
    const v=d[activeCurrency]||d.RUB||d.USD;
    if(!v||Array.isArray(v))return [];
    return v.dividends||[];
  }
  // Совместимость: иногда нужен «сырой» массив без обработки.
  function getSeriesArray(id){return getRawPrices(id);}

  /** Точки серии, попадающие в активный интервал [activeFromIso..activeToIso].
   *
   *  Для серий с реинвестом дивидендов (getRawDividends(id).length > 0)
   *  здесь же строится «total-return»-кривая по схеме «умного» реинвеста:
   *    1. На первой точке внутри интервала кол-во акций qty = 1.
   *    2. Идём по дням. Когда наступает ex-date очередного дивиденда
   *       (и его cum-date «Последняя дата приобретения» ВХОДИТ в активный
   *       интервал — иначе мы не успели бы купить бумагу до cum-date), —
   *       получаем дивиденд деньгами: cash = qty × dividend_per_share,
   *       и тут же реинвестируем по цене этого же дня (можно покупать
   *       дробные акции): qty += cash / price.
   *    3. Каждая следующая выплата считается уже на увеличенный qty,
   *       так что сложный процент работает корректно.
   *
   *  В выдаче value(t) = qty(t) × price(t) — это «стоимость пакета»
   *  при стартовом капитале в одну акцию. После getNormalizedSeriesData()
   *  она превращается в обычные % доходности (на старте 0%). */
  function getFilteredSeriesArray(id){
    const prices=getRawPrices(id);
    if(!prices||!prices.length)return [];

    const fromIso=activeFromIso||'';
    const toIso  =activeToIso  ||'9999-12-31';
    const filtered=prices.filter(function(p){return p.date>=fromIso && p.date<=toIso;});
    if(!filtered.length)return [];

    const divs=getRawDividends(id);
    if(!divs||!divs.length) return filtered.slice();

    // Берём только те выплаты, чья cum-date попадает в активный интервал
    // (значит «Последняя дата приобретения» позволяет нам получить дивиденд).
    // Сортируем по exDate, чтобы применять по порядку.
    const events=divs
      .filter(function(d){return d.lastBuy>=fromIso && d.lastBuy<=toIso;})
      .slice()
      .sort(function(a,b){return a.exDate.localeCompare(b.exDate);});

    let qty=1, divIdx=0;
    return filtered.map(function(p){
      // Все события с exDate <= p.date уже наступили — реинвестируем
      // их по цене этого дня (на ex-date цена уже включает «отскок» вниз
      // на величину дивиденда — это корректная цена покупки на реинвест).
      while(divIdx<events.length && events[divIdx].exDate<=p.date){
        const e=events[divIdx];
        if(p.value>0) qty += (qty*e.dividend)/p.value;
        divIdx++;
      }
      return {date:p.date, value: qty*p.value};
    });
  }

  /** База нормализации = первая точка серии внутри активного интервала. */
  function getBaseValue(seriesId){
    const arr=getFilteredSeriesArray(seriesId);
    if(!arr||!arr.length)return null;
    return arr[0].value>0?arr[0].value:null;
  }

  /** Массив [date, percentChange] для серии относительно базы.
   *  В выдаче — только точки внутри активного интервала. */
  function getNormalizedSeriesData(seriesId){
    const arr=getFilteredSeriesArray(seriesId);
    const base=getBaseValue(seriesId);
    if(!base)return arr.map(p=>[p.date,0]);
    return arr.map(p=>[p.date, ((p.value/base)-1)*100]);
  }

  function formatPercent(v,fd){
    if(typeof v!=='number'||!isFinite(v))return String(v);
    const f=fd==null?2:fd;
    const sign=v>0?'+':'';
    return sign+v.toLocaleString('ru-RU',{maximumFractionDigits:f,minimumFractionDigits:f})+'%';
  }
  function formatYAxisValue(v){return formatPercent(v,1);}

  // ===== УТИЛИТЫ =====
  function fmtDateRu(iso){const [y,m,d]=iso.split('-');return d+'.'+m+'.'+y;}
  function isoFromDate(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
  function tsToIso(ts){return isoFromDate(new Date(ts));}
  function isoToTs(iso){return new Date(iso+'T00:00:00').getTime();}
  function parseDateRu(s){
    const m=String(s||'').trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
    if(!m)return null;
    const d=parseInt(m[1],10),mo=parseInt(m[2],10),y=parseInt(m[3],10);
    if(d<1||d>31||mo<1||mo>12||y<1900||y>2100)return null;
    return y+'-'+String(mo).padStart(2,'0')+'-'+String(d).padStart(2,'0');
  }

  function clampRange(fromIso,toIso){
    if(fromIso<dataMinIso)fromIso=dataMinIso;
    if(toIso>dataMaxIso)toIso=dataMaxIso;
    if(fromIso>toIso){const t=fromIso;fromIso=toIso;toIso=t;}
    return [fromIso,toIso];
  }

  /** min/max нормализованной (% доходности) среди видимых серий в видимом окне [fromIso..toIso] + паддинг.
   *  fromIso / toIso — это окно зума ВНУТРИ активного интервала (для авто-подгонки Y-оси
   *  при колесе/слайдере). Сами данные серии уже отфильтрованы под активный интервал. */
  function computeYRange(fromIso,toIso){
    let mn=Infinity,mx=-Infinity;
    visibleSet.forEach(id=>{
      const arr=getFilteredSeriesArray(id);
      if(!arr||!arr.length)return;
      const base=getBaseValue(id);
      if(!base)return;
      for(let i=0;i<arr.length;i++){
        const p=arr[i];
        if(p.date<fromIso)continue;
        if(p.date>toIso)break;
        const norm=((p.value/base)-1)*100;
        if(norm<mn)mn=norm;
        if(norm>mx)mx=norm;
      }
    });
    if(!isFinite(mn)||!isFinite(mx))return null;
    // Включаем 0 (базовая линия) в диапазон.
    if(mn>0)mn=0;
    if(mx<0)mx=0;
    if(mn===mx){const pad=Math.abs(mn)*0.05+1;return {min:mn-pad,max:mx+pad};}
    const pad=(mx-mn)*0.08;
    return {min:mn-pad,max:mx+pad};
  }

  function periodToRange(period){
    const lastIso=dataMaxIso;
    const last=new Date(lastIso+'T00:00:00');
    let from;
    if(period==='ALL')return [dataMinIso,lastIso];
    if(period==='1W'){from=new Date(last);from.setDate(from.getDate()-7);}
    else if(period==='1M'){from=new Date(last);from.setMonth(from.getMonth()-1);}
    else if(period==='1Y'){from=new Date(last);from.setFullYear(from.getFullYear()-1);}
    else if(period==='YTD'){from=new Date(last.getFullYear(),0,1);}
    else if(period==='Y2008'){from=new Date(2008,0,1);}
    else if(period==='Y2014'){from=new Date(2014,0,1);}
    else if(period==='Y2022'){from=new Date(2022,0,1);}
    else return [dataMinIso,lastIso];
    return clampRange(isoFromDate(from),lastIso);
  }

  // ===== ИНИЦИАЛИЗАЦИЯ ГРАФИКА =====
  const dom=document.getElementById('chart');
  const chart=echarts.init(dom,null,{renderer:'canvas'});

  // Определяем сенсорное устройство (телефон / планшет): на нём меняем
  // поведение dataZoom (inside отключаем drag, чтобы страница скроллилась
  // обычным свайпом), а слайдер делаем визуально пожирнее.
  const isTouch=('ontouchstart' in window) || (window.matchMedia && window.matchMedia('(hover:none)').matches) || (navigator.maxTouchPoints||0)>0;

  // Стартовое окно зума и Y-диапазон считаем заранее, чтобы первая отрисовка
  // была сразу в нужном масштабе и без «прыжка» от полного диапазона.
  const initialPeriod='Y2014';
  const [initFromIso,initToIso]=periodToRange(initialPeriod);
  const initFromTs=isoToTs(initFromIso);
  const initToTs=isoToTs(initToIso);
  // Активный интервал по умолчанию — выбранный стартовый период.
  activeFromIso=initFromIso;
  activeToIso=initToIso;
  const initY=computeYRange(initFromIso,initToIso)||{min:null,max:null};

  /** Конвертирует hex (#RRGGBB) в rgba(...) с заданной прозрачностью. */
  function hexToRgba(hex,alpha){
    const m=String(hex||'').replace('#','').match(/^([0-9a-f]{6}|[0-9a-f]{3})$/i);
    if(!m)return 'rgba(0,0,0,'+alpha+')';
    let h=m[1];
    if(h.length===3)h=h.split('').map(c=>c+c).join('');
    const r=parseInt(h.slice(0,2),16),g=parseInt(h.slice(2,4),16),b=parseInt(h.slice(4,6),16);
    return 'rgba('+r+','+g+','+b+','+alpha+')';
  }

  /** Описание одной серии для ECharts. */
  function buildSeriesEntry(item){
    const op=opacityState[item.id]||0;
    return {
      id:item.id,
      name:item.name+' · '+(SERIES_GROUPS.find(g=>g.items.some(x=>x.id===item.id))||{}).title,
      type:'line',
      // smooth убран намеренно: при сильном зуме сглаживание Catmull-Rom
      // рассинхронизируется с заливкой areaStyle (контур заливки отстаёт
      // от кривой линии). С прямыми сегментами заливка всегда строго
      // под линией.
      smooth:false,
      showSymbol:false,
      symbol:'circle',
      symbolSize:6,
      sampling:'lttb',
      emphasis:{focus:'series',scale:false},
      lineStyle:{width:2,color:item.color,opacity:op},
      itemStyle:{color:item.color,opacity:op},
      areaStyle:{
        opacity:op*0.9,
        color:{
          type:'linear',x:0,y:0,x2:0,y2:1,
          colorStops:[
            {offset:0,color:hexToRgba(item.color,0.22)},
            {offset:1,color:hexToRgba(item.color,0.02)}
          ]
        }
      },
      z:op>0?10:1,
      silent:op<=0,
      data:getNormalizedSeriesData(item.id)
    };
  }

  // ===== КЕШ НОРМАЛИЗОВАННЫХ ДАННЫХ ДЛЯ ТУЛТИПА =====
  // Объявляем здесь (до baseOption), чтобы formatter и refreshNormCache
  // были доступны в момент первого вызова.
  const SERIES_NORM_CACHE={};

  function refreshNormCache(){
    ALL_ITEMS.forEach(function(item){
      SERIES_NORM_CACHE[item.id]=getNormalizedSeriesData(item.id);
    });
  }

  /** Бинарный поиск: последнее значение в normData с date <= iso.
   *  normData = [[isoDate, pct], ...] отсортирован по дате. */
  function findNearestValue(normData,iso){
    if(!normData||!normData.length)return null;
    let lo=0,hi=normData.length-1,res=null;
    while(lo<=hi){
      const mid=(lo+hi)>>1;
      if(normData[mid][0]<=iso){res=normData[mid][1];lo=mid+1;}
      else{hi=mid-1;}
    }
    return res;
  }

  // Инициализируем кеш ДО первой отрисовки
  refreshNormCache();

  const baseOption={
    color:['#6f3ff5'],
    // Анимация старта (первая отрисовка линии).
    // Все последующие изменения анимируем сами через requestAnimationFrame,
    // поэтому встроенные update-анимации ECharts отключаем (durationUpdate:0).
    animation:true,
    animationDuration:800,
    animationEasing:'cubicOut',
    animationDurationUpdate:0,
    animationThreshold:20000,
    grid:{left:isTouch?44:56,right:isTouch?12:24,top:24,bottom:isTouch?80:96,containLabel:false},
    tooltip:{
      trigger:'axis',
      backgroundColor:'#fff',
      borderColor:'#ececf2',
      borderWidth:1,
      padding:[8,12],
      textStyle:{color:'#111',fontSize:12,fontFamily:'Graphik,Inter,Segoe UI,sans-serif'},
      axisPointer:{type:'line',lineStyle:{color:'#6f3ff5',width:1,type:'dashed'}},
      extraCssText:'box-shadow:0 6px 24px -8px rgba(17,17,17,0.18);border-radius:8px',
      transitionDuration:0.2,
      formatter:function(params){
        if(!params||!params.length)return '';
        // Берём дату из первого пришедшего параметра (любая серия).
        // Для каждой ВИДИМОЙ серии затем ищем ближайшую точку ≤ этой дате
        // из кеша — это позволяет показывать все серии независимо от того,
        // есть ли у них точка именно на эту дату (разные торговые дни).
        const firstVal=params[0].value;
        const iso=(typeof firstVal[0]==='string')?firstVal[0]:tsToIso(firstVal[0]);
        const baseLabel='от '+fmtDateRu(activeFromIso||'');
        let html='<div style="font-size:11px;color:#8a8a96;margin-bottom:6px;display:flex;justify-content:space-between;gap:14px">'+
                    '<span style="opacity:.85">'+baseLabel+'</span>'+
                    '<span>'+fmtDateRu(iso)+'</span>'+
                 '</div>';
        let hasAny=false;
        ALL_ITEMS.forEach(function(item){
          if(!visibleSet.has(item.id))return;
          const nd=SERIES_NORM_CACHE[item.id];
          const v=findNearestValue(nd,iso);
          if(v===null||v===undefined)return;
          hasAny=true;
          const color=(typeof v==='number'&&v<0)?'#d04343':'#1f8a4d';
          const pct=formatPercent(typeof v==='number'?v:0,2);
          html+='<div style="display:flex;align-items:center;gap:8px;margin-top:2px">'+
                  '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;background:'+item.color+'"></span>'+
                  '<span style="color:#111;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:220px" title="'+item.name+'">'+item.name+'</span>'+
                  '<span style="margin-left:auto;padding-left:8px;color:'+color+';font-weight:600;flex-shrink:0">'+pct+'</span>'+
                '</div>';
        });
        return hasAny?html:'';
      }
    },
    xAxis:{
      type:'time',
      // Стартовые границы оси = выбранный по умолчанию период (initialPeriod).
      // Это сразу запрещает зум-out за пределы стартового интервала.
      // При смене периода эти границы перевычисляются в lockXAxisTo().
      min:initFromTs,
      max:initToTs,
      axisLine:{lineStyle:{color:'#ececf2'}},
      axisTick:{show:false},
      axisLabel:{color:'#8a8a96',fontSize:11,hideOverlap:true},
      splitLine:{show:false}
    },
    yAxis:{
      type:'value',
      min:initY.min,
      max:initY.max,
      axisLine:{show:false},
      axisTick:{show:false},
      axisLabel:{color:'#8a8a96',fontSize:11,formatter:function(v){return formatYAxisValue(v)}},
      splitLine:{lineStyle:{color:'#f0f0f6'}}
    },
    dataZoom:[
      {
        id:'dzInside',type:'inside',xAxisIndex:0,filterMode:'none',
        startValue:initFromTs,endValue:initToTs,
        // На сенсорных устройствах отключаем drag-панораму внутри графика,
        // чтобы свайп пальцем нормально скроллил страницу.
        // Pinch-зум остаётся работоспособным.
        zoomOnMouseWheel:!isTouch,moveOnMouseMove:!isTouch,moveOnMouseWheel:false,
        throttle:40,zoomLock:false
      },
      {
        id:'dzSlider',type:'slider',xAxisIndex:0,filterMode:'none',
        startValue:initFromTs,endValue:initToTs,
        // На мобилке слайдер пожирнее, чтобы было удобно тащить пальцем.
        height:isTouch?32:22,bottom:isTouch?16:24,
        handleSize:isTouch?'140%':'100%',
        borderColor:'transparent',
        backgroundColor:'#fafafe',
        fillerColor:'rgba(111,63,245,0.12)',
        handleStyle:{color:'#fff',borderColor:'#6f3ff5',borderWidth:1.5,shadowBlur:0},
        moveHandleStyle:{color:'#6f3ff5',opacity:.6},
        selectedDataBackground:{lineStyle:{color:'#6f3ff5',opacity:.6,width:1},areaStyle:{color:'#6f3ff5',opacity:.12}},
        dataBackground:{lineStyle:{color:'#c9c9d3',width:1},areaStyle:{color:'#ececf2'}},
        textStyle:{color:'#8a8a96',fontSize:10,fontFamily:'Graphik,Inter,Segoe UI,sans-serif'},
        labelFormatter:function(v){const d=new Date(v);return isNaN(d.getTime())?'':fmtDateRu(isoFromDate(d));}
      }
    ],
    series:ALL_ITEMS.map(buildSeriesEntry)
  };

  chart.setOption(baseOption);

  // ===== ПЛАВНАЯ АНИМАЦИЯ ПЕРЕХОДОВ =====
  // Один кадр = одно setOption, одновременно меняющее dataZoom (X) и yAxis.
  // Это гарантирует синхронное движение по обеим осям без «рывков».

  let activePeriod=initialPeriod;
  let isProgrammaticDateChange=false;
  let isProgrammaticZoom=false;
  let zoomEventTimer=null;
  let animFrameId=null;

  function easeCubicInOut(t){
    return t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
  }

  function readCurrentZoom(){
    const opt=chart.getOption();
    const dz=opt.dataZoom&&opt.dataZoom[0];
    let sv,ev;
    if(dz){
      if(dz.startValue!=null && dz.endValue!=null){sv=+dz.startValue;ev=+dz.endValue;}
      else{
        const s=(dz.start==null?0:dz.start)/100;
        const e=(dz.end==null?100:dz.end)/100;
        sv=dataMinTs+(dataMaxTs-dataMinTs)*s;
        ev=dataMinTs+(dataMaxTs-dataMinTs)*e;
      }
    }else{sv=dataMinTs;ev=dataMaxTs;}
    const yAx=opt.yAxis&&opt.yAxis[0];
    let ymin=yAx?yAx.min:null;
    let ymax=yAx?yAx.max:null;
    if(ymin==null||ymax==null||typeof ymin!=='number'||typeof ymax!=='number'){
      const fb=computeYRange(tsToIso(sv),tsToIso(ev));
      if(fb){ymin=fb.min;ymax=fb.max;}else{ymin=0;ymax=1;}
    }
    return {fromTs:sv,toTs:ev,ymin:ymin,ymax:ymax};
  }

  function applySnapshot(fromTs,toTs,ymin,ymax){
    chart.setOption({
      dataZoom:[
        {id:'dzInside',startValue:fromTs,endValue:toTs},
        {id:'dzSlider',startValue:fromTs,endValue:toTs}
      ],
      yAxis:{min:ymin,max:ymax}
    });
  }

  /** Плавный переход к диапазону [fromIso..toIso] за `duration` мс.
   *  `onComplete` — необязательный callback, вызывается после завершения
   *  анимации (используется в applyPeriod / onDateChange для жёсткой
   *  блокировки оси X границами выбранного периода). */
  function animatedZoom(fromIso,toIso,duration,onComplete){
    const [a,b]=clampRange(fromIso,toIso);
    const targetFromTs=isoToTs(a);
    const targetToTs=isoToTs(b);
    const targetY=computeYRange(a,b)||{min:0,max:1};
    const cur=readCurrentZoom();

    if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}

    setDateInputs(a,b);

    const xChanged=Math.abs(cur.fromTs-targetFromTs)>1 || Math.abs(cur.toTs-targetToTs)>1;
    const yScale=Math.max(Math.abs(cur.ymax-cur.ymin),Math.abs(targetY.max-targetY.min),1);
    const yDelta=Math.abs(cur.ymin-targetY.min)+Math.abs(cur.ymax-targetY.max);
    const yChanged=(yDelta/yScale)>0.001;
    if(!xChanged && !yChanged){
      applySnapshot(targetFromTs,targetToTs,targetY.min,targetY.max);
      if(onComplete)onComplete();
      return;
    }

    const dur=duration||650;
    const t0=performance.now();
    isProgrammaticZoom=true;

    function step(now){
      const t=Math.min(1,(now-t0)/dur);
      const e=easeCubicInOut(t);
      const fts=cur.fromTs+(targetFromTs-cur.fromTs)*e;
      const tts=cur.toTs+(targetToTs-cur.toTs)*e;
      const ymin=cur.ymin+(targetY.min-cur.ymin)*e;
      const ymax=cur.ymax+(targetY.max-cur.ymax)*e;
      applySnapshot(fts,tts,ymin,ymax);
      if(t<1){
        animFrameId=requestAnimationFrame(step);
      }else{
        animFrameId=null;
        isProgrammaticZoom=false;
        if(onComplete)onComplete();
      }
    }
    animFrameId=requestAnimationFrame(step);
  }

  function setDateInputs(fromIso,toIso){
    isProgrammaticDateChange=true;
    if(fpFrom)fpFrom.setDate(fmtDateRu(fromIso),false);
    if(fpTo)fpTo.setDate(fmtDateRu(toIso),false);
    isProgrammaticDateChange=false;
  }

  function setActiveButton(period){
    document.querySelectorAll('#periodBtns .period-btn').forEach(b=>{
      b.classList.toggle('active', b.dataset.period===period);
    });
  }

  /** Подменить data всех серий нормализованными значениями (для текущей базы и валюты).
   *  Передаём ПОЛНУЮ конфигурацию серии (через buildSeriesEntry), чтобы ECharts
   *  гарантированно обновил data — частичный merge {id,data} в некоторых случаях
   *  не приводит к перерисовке точек. */
  function rebuildAllSeriesData(){
    refreshNormCache();
    chart.setOption({
      series:ALL_ITEMS.map(buildSeriesEntry)
    });
    renderResultsTable();
  }

  /** Установить новый активный интервал и плавно зазумиться к нему.
   *  При смене активного интервала ВСЕ точки серии вне [from..to] выкидываются
   *  из данных ECharts, нормализация считается заново от первой точки внутри. */
  function setActiveRangeAndZoom(fromIso,toIso,duration,onComplete){
    if(fromIso!==activeFromIso || toIso!==activeToIso){
      activeFromIso=fromIso;
      activeToIso=toIso;
      rebuildAllSeriesData();
    }
    animatedZoom(fromIso,toIso,duration,onComplete);
  }

  /** Жёстко ограничить ось X выбранным интервалом, чтобы пользовательский
   *  zoom-out не выходил за его границы (т.е. нельзя случайно увидеть
   *  данные ДО даты «от» выбранного периода). */
  function lockXAxisTo(fromIso,toIso){
    const [a,b]=clampRange(fromIso,toIso);
    chart.setOption({xAxis:{min:isoToTs(a),max:isoToTs(b)}});
  }

  function applyPeriod(period){
    const [from,to]=periodToRange(period);
    activePeriod=period;
    setActiveButton(period);
    // На время анимации снимаем ограничения оси, чтобы плавно дойти к новым
    // границам (например, при переходе с узкого периода на широкий).
    chart.setOption({xAxis:{min:dataMinTs,max:dataMaxTs}});
    const myPeriod=period;
    setActiveRangeAndZoom(from,to,undefined,function(){
      // Если за время анимации пользователь не выбрал другой период —
      // ограничиваем ось X границами этого.
      if(activePeriod===myPeriod) lockXAxisTo(from,to);
    });
  }

  // ===== СОБЫТИЯ КНОПОК / ДАТ =====
  document.getElementById('periodBtns').addEventListener('click',function(e){
    const btn=e.target.closest('.period-btn');
    if(!btn)return;
    applyPeriod(btn.dataset.period);
  });

  // Двойной клик — плавный возврат к границам активного интервала
  // (т.е. к тому, что выбрано кнопкой или календарём; зум внутри сбрасывается).
  dom.addEventListener('dblclick',function(){
    if(activeFromIso&&activeToIso) animatedZoom(activeFromIso,activeToIso);
  });

  window.addEventListener('resize',function(){chart.resize()});

  // Пользовательский зум (колесо/слайдер/drag): подстраиваем только Y-ось.
  // Поля «от» / «по» НЕ трогаем — они отражают именно ту дату, которую
  // пользователь сам задал кнопкой или календарём. То же самое и с базой
  // нормализации: она пересчитывается только при явной смене даты.
  // Активная кнопка периода тоже сохраняется (зум — это просто разглядывание
  // деталей внутри выбранного периода, не его изменение).
  chart.on('dataZoom',function(){
    if(isProgrammaticZoom)return;
    if(zoomEventTimer)clearTimeout(zoomEventTimer);
    zoomEventTimer=setTimeout(function(){
      const cur=readCurrentZoom();
      const fromIso=tsToIso(cur.fromTs);
      const toIso=tsToIso(cur.toTs);
      const yr=computeYRange(fromIso,toIso);
      if(yr)chart.setOption({yAxis:{min:yr.min,max:yr.max}});
    },80);
  });

  // ===== FLATPICKR =====
  let fpFrom,fpTo;
  function onDateChange(){
    if(isProgrammaticDateChange)return;
    const fromStr=document.getElementById('dateFrom').value.trim();
    const toStr=document.getElementById('dateTo').value.trim();
    const fromIso=parseDateRu(fromStr)||dataMinIso;
    const toIso=parseDateRu(toStr)||dataMaxIso;
    activePeriod='';
    setActiveButton('');
    // На время анимации снимаем ограничения оси.
    chart.setOption({xAxis:{min:dataMinTs,max:dataMaxTs}});
    setActiveRangeAndZoom(fromIso,toIso,undefined,function(){
      // После окончания анимации — ограничиваем ось X выбранным интервалом.
      lockXAxisTo(fromIso,toIso);
    });
  }

  fpFrom=flatpickr('#dateFrom',{
    dateFormat:'d.m.Y',locale:'ru',allowInput:false,
    minDate:fmtDateRu(dataMinIso),maxDate:fmtDateRu(dataMaxIso),
    onChange:onDateChange
  });
  fpTo=flatpickr('#dateTo',{
    dateFormat:'d.m.Y',locale:'ru',allowInput:false,
    minDate:fmtDateRu(dataMinIso),maxDate:fmtDateRu(dataMaxIso),
    onChange:onDateChange
  });

  // ===== ПЕРЕКЛЮЧЕНИЕ СЕРИЙ =====
  // У каждой серии своя независимая RAF-анимация прозрачности (320 мс),
  // поэтому несколько включений/выключений могут идти параллельно
  // и не конфликтуют с RAF-анимацией зума по X/Y.
  const opAnims={};

  function animateSeriesOpacity(item,target){
    if(opAnims[item.id]){cancelAnimationFrame(opAnims[item.id]);opAnims[item.id]=null;}
    const cur=opacityState[item.id]==null?0:opacityState[item.id];
    const dur=320;
    const t0=performance.now();
    if(target>cur){
      // При появлении сразу выводим серию вверх и включаем взаимодействие.
      chart.setOption({series:[{id:item.id,z:10,silent:false}]});
    }
    function step(now){
      const t=Math.min(1,(now-t0)/dur);
      const e=easeCubicInOut(t);
      const v=cur+(target-cur)*e;
      opacityState[item.id]=v;
      chart.setOption({series:[{
        id:item.id,
        lineStyle:{opacity:v},
        itemStyle:{opacity:v},
        areaStyle:{opacity:v*0.9}
      }]});
      if(t<1){
        opAnims[item.id]=requestAnimationFrame(step);
      }else{
        opAnims[item.id]=null;
        if(target<=0){
          chart.setOption({series:[{id:item.id,z:1,silent:true}]});
        }
      }
    }
    opAnims[item.id]=requestAnimationFrame(step);
  }

  function toggleSeries(item){
    if(visibleSet.has(item.id)){
      visibleSet.delete(item.id);
      animateSeriesOpacity(item,0);
    }else{
      visibleSet.add(item.id);
      animateSeriesOpacity(item,1);
    }
    renderResultsTable();
    // Y-ось плавно подстраиваем под новый набор видимых серий.
    const cur=readCurrentZoom();
    animatedZoom(tsToIso(cur.fromTs),tsToIso(cur.toTs),320);
  }

  // ===== РЕНДЕР ПАНЕЛИ КЛАСТЕРОВ =====
  function renderSeriesPanel(){
    const panel=document.getElementById('seriesPanel');
    if(!panel)return;
    panel.innerHTML='';
    SERIES_GROUPS.forEach(g=>{
      const groupEl=document.createElement('div');
      groupEl.className='series-group';
      const chipsHtml = g.items.length
        ? g.items.map(it=>(
            '<button type="button" class="series-chip'+(visibleSet.has(it.id)?' active':'')+'" '+
              'data-id="'+it.id+'" style="--c:'+it.color+'">'+it.name+'</button>'
          )).join('')
        : '<div class="series-empty">скоро</div>';
      groupEl.innerHTML=
        '<div class="series-group-title">'+g.title+'</div>'+
        '<div class="series-chips">'+chipsHtml+'</div>';
      panel.appendChild(groupEl);
    });
  }
  renderSeriesPanel();

  // ===== ТАБЛИЦА РЕЗУЛЬТАТОВ =====
  // Живые DOM-строки, чтобы добавление/удаление анимировались плавно.
  // resultsRowMap: id → {tr, rankCell, retCell}
  const resultsRowMap=new Map();
  let resultsTableBody=null;
  let resultsHeaderDates=null;

  function _buildTableShell(wrap){
    const fromLabel=activeFromIso?fmtDateRu(activeFromIso):'';
    const toLabel=activeToIso?fmtDateRu(activeToIso):'';
    wrap.innerHTML=
      '<table class="results-table">'+
        '<thead><tr>'+
          '<th class="num">#</th>'+
          '<th>Инструмент</th>'+
          '<th class="num rt-header-dates">Доходность '+fromLabel+' — '+toLabel+'</th>'+
        '</tr></thead>'+
        '<tbody id="resultsTableBody"></tbody>'+
      '</table>';
    resultsTableBody=document.getElementById('resultsTableBody');
    resultsHeaderDates=wrap.querySelector('.rt-header-dates');
  }

  function _makeRow(row,rank){
    const tr=document.createElement('tr');
    const v=row.val;
    const cls=v>0.005?'pos':v<-0.005?'neg':'zero';
    const sign=v>0?'+':'';
    const pct=sign+v.toLocaleString('ru-RU',{maximumFractionDigits:2,minimumFractionDigits:2})+'%';
    tr.innerHTML=
      '<td class="rank">'+rank+'</td>'+
      '<td><div class="name-cell">'+
        '<span class="dot" style="background:'+row.item.color+'"></span>'+
        '<span class="sname">'+row.item.name+'</span>'+
      '</div></td>'+
      '<td class="ret '+cls+'">'+pct+'</td>';
    return tr;
  }

  function _updateRow(data,row,rank){
    const v=row.val;
    const cls=v>0.005?'pos':v<-0.005?'neg':'zero';
    const sign=v>0?'+':'';
    const pct=sign+v.toLocaleString('ru-RU',{maximumFractionDigits:2,minimumFractionDigits:2})+'%';
    data.tr.cells[0].textContent=rank;
    const retCell=data.tr.cells[2];
    retCell.textContent=pct;
    retCell.className='ret '+cls;
  }

  function renderResultsTable(){
    const wrap=document.getElementById('resultsTableWrap');
    if(!wrap)return;

    // Собираем видимые серии с данными
    const rows=[];
    ALL_ITEMS.forEach(function(item){
      if(!visibleSet.has(item.id))return;
      const nd=SERIES_NORM_CACHE[item.id];
      if(!nd||!nd.length)return;
      const finalVal=nd[nd.length-1][1];
      const group=SERIES_GROUPS.find(function(g){return g.items.some(function(x){return x.id===item.id;});});
      rows.push({item:item,val:finalVal,cluster:group?group.title:''});
    });
    rows.sort(function(a,b){return b.val-a.val;});

    // Убедимся что скелет таблицы существует
    if(!resultsTableBody||!document.getElementById('resultsTableBody')){
      _buildTableShell(wrap);
      resultsRowMap.clear();
    }

    // Обновим заголовок с датами
    if(resultsHeaderDates){
      const fl=activeFromIso?fmtDateRu(activeFromIso):'';
      const tl=activeToIso?fmtDateRu(activeToIso):'';
      resultsHeaderDates.textContent='Доходность '+fl+' — '+tl;
    }

    const newIds=new Set(rows.map(function(r){return r.item.id;}));

    // Убираем строки которых нет в новом списке
    resultsRowMap.forEach(function(data,id){
      if(!newIds.has(id)){
        const tr=data.tr;
        tr.classList.add('rt-exit');
        setTimeout(function(){
          if(tr.parentNode)tr.parentNode.removeChild(tr);
          resultsRowMap.delete(id);
        },290);
      }
    });

    // Добавляем новые / обновляем существующие
    rows.forEach(function(row,i){
      const id=row.item.id;
      if(!resultsRowMap.has(id)){
        const tr=_makeRow(row,i+1);
        tr.classList.add('rt-enter');
        resultsTableBody.appendChild(tr);
        resultsRowMap.set(id,{tr:tr});
        // Один RAF: снимаем enter-класс → браузер проиграет transition
        requestAnimationFrame(function(){
          requestAnimationFrame(function(){tr.classList.remove('rt-enter');});
        });
      }else{
        _updateRow(resultsRowMap.get(id),row,i+1);
      }
    });

    // Переставляем строки в tbody в нужном порядке (без анимации позиции)
    rows.forEach(function(row){
      const data=resultsRowMap.get(row.item.id);
      if(data&&data.tr.parentNode)resultsTableBody.appendChild(data.tr);
    });
  }

  renderResultsTable();

  document.getElementById('seriesPanel').addEventListener('click',function(e){
    const btn=e.target.closest('.series-chip');
    if(!btn)return;
    const id=btn.dataset.id;
    const item=ALL_ITEMS.find(x=>x.id===id);
    if(!item)return;
    btn.classList.toggle('active');
    toggleSeries(item);
  });

  // ===== ПЕРЕКЛЮЧАТЕЛЬ ВАЛЮТЫ =====
  function applyCurrToggleUI(){
    document.querySelectorAll('#currToggle .curr-toggle-opt').forEach(b=>{
      b.classList.toggle('active', b.dataset.curr===activeCurrency);
    });
  }

  /** Плавная смена валюты: видимые серии fade-out → подмена данных → fade-in. */
  function setCurrency(curr){
    if(curr!=='RUB' && curr!=='USD')return;
    if(curr===activeCurrency || isCurrencyTransitioning)return;
    isCurrencyTransitioning=true;
    activeCurrency=curr;
    applyCurrToggleUI();

    const visibleItems=ALL_ITEMS.filter(it=>visibleSet.has(it.id));
    const fadeMs=260;

    // 1) Плавно скрываем видимые серии.
    visibleItems.forEach(it=>animateSeriesOpacity(it,0));

    setTimeout(function(){
      // 2) Пересчитываем нормализованные данные в новой валюте.
      rebuildAllSeriesData();
      const cur=readCurrentZoom();
      const fromIso=tsToIso(cur.fromTs);
      const toIso=tsToIso(cur.toTs);
      const yr=computeYRange(fromIso,toIso);
      if(yr)chart.setOption({yAxis:{min:yr.min,max:yr.max}});

      // 3) Плавно возвращаем видимость.
      visibleItems.forEach(it=>animateSeriesOpacity(it,1));
      setTimeout(function(){isCurrencyTransitioning=false;},fadeMs+30);
    }, fadeMs+20);
  }

  document.getElementById('currToggle').addEventListener('click',function(e){
    const btn=e.target.closest('.curr-toggle-opt[data-curr]');
    if(!btn)return;
    setCurrency(btn.dataset.curr);
  });

  // ===== СТАРТ =====
  // Стартовый период уже задан в baseOption; нужно только синхронизировать UI.
  setDateInputs(initFromIso,initToIso);
  setActiveButton(initialPeriod);
  applyCurrToggleUI();
})();
</script>
</body>
